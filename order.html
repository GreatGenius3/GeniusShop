<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Orderbekräftelse - Genius Webbshop</title>
    <link href="css/styles.css" rel="stylesheet" />
</head>
<body>
<!-- Navigation baren ovanpå sidan -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Startsida</a>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
                <li class="nav-item">
                    <a class="nav-link position-relative" href="cart.html" id="cart-icon">
                        🛒 Varukorg
                        <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cart-count" style="display: none;">0</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<header class="py-5 bg-image-full" style="background-image: url('images/landscape-abstract.jpg')">
    <div class="text-center my-5">
        <h1 class="text-white fs-3 fw-bolder">Orderbekräftelse</h1>
        <p class="text-white-50 mb-0">Slutför ditt köp</p>
    </div>
</header>

<main class="py-5">
    <div class="container">
        <div class="row">
            <div class="col-lg-6 mb-4">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h3 class="mb-0">Dina produkter</h3>
                    </div>
                    <div class="card-body">
                        <div id="productInfo">
                            <!-- Produktdata kommer att visas här -->
                        </div>
                        <div class="mt-3">
                            <h4>Totalt: <span id="order-total" class="text-success fw-bold">$0</span></h4>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-lg-6 mb-4">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h3 class="mb-0">Kundinformation</h3>
                    </div>
                    <div class="card-body">
                        <form id="orderForm">
                            <div class="mb-3">
                                <label for="name" class="form-label">Namn *</label>
                                <input type="text" class="form-control" id="name" required>
                            </div>
                            <div class="mb-3">
                                <label for="email" class="form-label">E-post *</label>
                                <input type="text" class="form-control" id="email" required>
                            </div>
                            <div class="mb-3">
                                <label for="mobile_number" class="form-label">Telefonnummer *</label>
                                <input type="text" class="form-control" id="mobile_number" required>
                            </div>
                            <div class="mb-3">
                                <label for="street_adress" class="form-label">Adress *</label>
                                <input type="text" class="form-control" id="street_adress" required>
                            </div>
                            <div class="mb-3">
                                <label for="post_number" class="form-label">Postnummer *</label>
                                <input type="text" class="form-control" id="post_number" required>
                            </div>
                            <div class="mb-3">
                                <label for="locality" class="form-label">Ort *</label>
                                <input type="text" class="form-control" id="locality" required>
                            </div>

                            <button type="submit" class="btn btn-success btn-lg w-100">Bekräfta köp</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</main>

<!-- Footer-->
<footer class="py-5 bg-dark">
    <!-- Footer-innehåll genereras via JavaScript -->
</footer>
<!-- Bootstrap core JS-->
<script src="scripts/bootstrap.bundle.min.js"></script>
<!-- Core theme JS-->
<script src="scripts/scripts.js"></script>
<script>
    // Jag har lagt en separat script här just endast för denna sida
    // Det går säkert att ordna detta i script.js men jag undersöker det senare.
    document.addEventListener('DOMContentLoaded', function()
    {
        const cartItems = sessionStorage.getItem('cartItems');
        if (cartItems)
        {
            const cart = JSON.parse(cartItems);
            displayCartProducts(cart);
        }
        else
        {
            // Fallback för enskild produkt (bakåtkompatibilitet)
            const savedProduct = sessionStorage.getItem('valdProdukt');
            if (savedProduct)
            {
                const product = JSON.parse(savedProduct);
                displayCartProducts([{...product, quantity: 1}]);
            }
            else
            {
                window.location.href = 'index.html';
            }
        }
    });

    // Funktionen som visar alla produkterna från våran
    // Varukorg
    function displayCartProducts(cart)
    {
        const productInfo = document.getElementById('productInfo');
        const orderTotal = document.getElementById('order-total');
        
        productInfo.innerHTML = '';
        let total = 0;

        // Går igenom varukorgen och visar varje produkt
        cart.forEach(item => {
            const productDiv = document.createElement('div');
            productDiv.className = 'mb-3 pb-3 border-bottom';
            
            productDiv.innerHTML = `
                <div class="d-flex align-items-center">
                    <img src="${item.image}" alt="${item.title}" class="me-3" style="width: 60px; height: 60px; object-fit: cover; border-radius: 8px;">
                    <div class="flex-grow-1">
                        <h6 class="mb-1">${item.title}</h6>
                        <p class="mb-1 text-success fw-bold">$${item.price} x ${item.quantity}</p>
                        <p class="mb-0"><strong>Delsumma:</strong> $${(item.price * item.quantity).toFixed(2)}</p>
                    </div>
                </div>
            `;
            
            productInfo.appendChild(productDiv);
            total += item.price * item.quantity;
        });

        orderTotal.textContent = `$${total.toFixed(2)}`;
    }
</script>
</body>


</html>
