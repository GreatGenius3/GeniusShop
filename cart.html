<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Varukorg - Genius Webbshop</title>
    <link href="css/styles.css" rel="stylesheet" />
</head>
<body>
    <!-- Navigation baren ovanpå sidan -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">Startsida</a>
            <div class="collapse navbar-collapse" id="navbarSupportedContent">
                <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Hem</a></li>
                    <li class="nav-item"><a class="nav-link" href="about.html">Om oss</a></li>
                    <li class="nav-item"><a class="nav-link" href="contact.html">Kontakt</a></li>
                    <li class="nav-item">
                        <!-- Här är varukorgens länk, jag använder mig av a taggen för att få med iconen -->
                        <a class="nav-link position-relative" href="cart.html" id="cart-icon">
                            🛒 Varukorg
                            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" id="cart-count" style="display: none;">0</span>
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <header class="py-5 bg-image-full" style="background-image: url('images/landscape-abstract.jpg')">
        <div class="text-center my-5">
            <h1 class="text-white fs-3 fw-bolder">Varukorg</h1>
            <p class="text-white-50 mb-0">Här ser du dina valda produkter</p>
        </div>
    </header>

    <main class="py-5">
        <div class="container">
            <div id="cart-content">
                <!-- Varukorgsinnehåll genereras via JavaScript -->
            </div>
            
            <div class="row mt-4" id="cart-summary" style="display: none;">
                <div class="col-md-8">
                    <div class="card">
                        <div class="card-header bg-success text-white">
                            <h3 class="mb-0">Beställning</h3>
                        </div>
                        <div class="card-body">
                            <p class="fs-4">Totalt: <span id="cart-total" class="text-success fw-bold">$0</span></p>
                            <button id="checkout-btn" class="btn btn-success btn-lg w-100 mb-2">Gå till kassan</button>
                            <button id="clear-cart-btn" class="btn btn-danger btn-lg w-100">Rensa varukorg</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer-->
    <footer class="py-5 bg-dark">
        <!-- Footer-innehåll genereras via JavaScript -->
    </footer>
    
    <!-- Bootstrap core JS-->
    <script src="scripts/bootstrap.bundle.min.js"></script>
    <!-- Core theme JS-->
    <script src="scripts/scripts.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            displayCart();
            updateCartIcon();
        });

        function displayCart() {
            const cart = getCart();
            const cartContent = document.getElementById('cart-content');
            const cartSummary = document.getElementById('cart-summary');
            
            if (cart.length === 0) {
                cartContent.innerHTML = `
                    <div class="text-center py-5">
                        <h2>Din varukorg är tom</h2>
                        <p class="text-muted">Du har inte lagt till några produkter än.</p>
                        <a href="index.html" class="btn btn-primary">Fortsätt handla</a>
                    </div>
                `;
                cartSummary.style.display = 'none';
            } else {
                let cartHTML = '<div class="row">';
                
                cart.forEach(item => {
                    cartHTML += `
                        <div class="col-12 mb-4">
                            <div class="card">
                                <div class="card-body">
                                    <div class="row align-items-center">
                                        <div class="col-md-2">
                                            <img src="${item.image}" alt="${item.title}" class="img-fluid rounded">
                                        </div>
                                        <div class="col-md-4">
                                            <h5>${item.title}</h5>
                                            <p class="text-success fw-bold">$${item.price}</p>
                                        </div>
                                        <div class="col-md-3">
                                            <div class="input-group">
                                                <button class="btn btn-outline-secondary" onclick="updateQuantity(${item.id}, ${item.quantity - 1})">-</button>
                                                <input type="number" class="form-control text-center" value="${item.quantity}" min="1" onchange="updateQuantity(${item.id}, parseInt(this.value))">
                                                <button class="btn btn-outline-secondary" onclick="updateQuantity(${item.id}, ${item.quantity + 1})">+</button>
                                            </div>
                                        </div>
                                        <div class="col-md-2 text-end">
                                            <h5>$${(item.price * item.quantity).toFixed(2)}</h5>
                                        </div>
                                        <div class="col-md-1 text-end">
                                            <button class="btn btn-danger" onclick="removeFromCart(${item.id})">🗑️</button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `;
                });
                
                cartHTML += '</div>';
                cartContent.innerHTML = cartHTML;
                
                // Visa total och kassaknapp
                const total = getCartTotal();
                document.getElementById('cart-total').textContent = `$${total.toFixed(2)}`;
                cartSummary.style.display = 'block';
            }
        }

        // Uppdatera befintliga funktioner för att ladda om varukorgen när ändringar görs
        const originalUpdateQuantity = updateQuantity;
        updateQuantity = function(id, quantity) {
            originalUpdateQuantity(id, quantity);
            displayCart();
            updateCartIcon();
        };

        const originalRemoveFromCart = removeFromCart;
        removeFromCart = function(id) {
            originalRemoveFromCart(id);
            displayCart();
            updateCartIcon();
        };

        // Hantera kassaknapp
        document.getElementById('checkout-btn').addEventListener('click', function() {
            const cart = getCart();
            if (cart.length > 0) {
                // Spara hela varukorgen i sessionStorage för order-sidan
                sessionStorage.setItem('cartItems', JSON.stringify(cart));
                window.location.href = 'order.html';
            }
        });

        // Hantera rensa varukorg-knapp
        document.getElementById('clear-cart-btn').addEventListener('click', function() {
            if (confirm('Är du säker på att du vill rensa hela varukorgen?')) {
                localStorage.removeItem('cart');
                displayCart();
                updateCartIcon();
            }
        });
    </script>
</body>
</html>
